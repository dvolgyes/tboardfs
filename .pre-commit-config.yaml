- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.15
  hooks:

  - id: ruff-check
    name: ruff-check (tests)
    files: ^tests/
    args:
    - --fix

  - id: ruff-check
    name: ruff-check (extended)
    exclude: ^tests/
    args:
    - --fix
    - --extend-select=ANN,YTT,ASYNC,C4,T20,RET,SIM,PTH,FLY,NPY,PD,N,UP,FURB,RUF
    - --config
    - |
      [lint.flake8-tidy-imports.banned-api]
      "osgeo".msg = "Use `rasterio` (preferred) or `geopandas`/`shapely` (if necessary) instead."
      "os.path".msg = "Use the modern `pathlib` module instead of `os.path`."

  - id: ruff-format

