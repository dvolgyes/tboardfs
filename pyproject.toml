[project]
name = "tboardfs"
version = "0.1.0"
description = "FUSE filesystem interface for TensorBoard logs"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "tensorboard>=2.0.0",
    "fusepy>=3.0.0",
    "click>=8.0.0",
    "numpy>2.0",
    "Pillow>=8.0.0",
    "loguru>=0.7.0",
    "tqdm>=4.65.0",
    "python-magic>=0.4.27",
]

[project.scripts]
tboardfs = "tboardfs.cli:main"

[project.optional-dependencies]
test = [
    "coverage>=7.8.2",
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[dependency-groups]
dev = [
    "coverage>=7.8.2",
    "pytest>=8.3.5",
    "pytest-cov>=6.1.1",
    "torch>=2.7.1",
    "torchvision>=0.22.1",
    "types-click>=7.1.8",
    "types-tqdm>=4.67.0.20250516",
]

[tool.uv]
package = true

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
# disallow_untyped_defs = true  # Temporarily disabled
# disallow_incomplete_defs = true  # Temporarily disabled
check_untyped_defs = true
# disallow_untyped_decorators = true  # Temporarily disabled
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[[tool.mypy.overrides]]
module = [
    "tensorboard.*",
    "loguru",
    "magic",
    "PIL",
    "numpy",
]
ignore_missing_imports = true
